name: Auto Merge and Clean Subscriptions

on:
  schedule:
    # 每天北京时间 8:00 和 20:00 自动执行
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许手动点击按钮运行

jobs:
  update-sub:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Script
      run: python merge.py

    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add sub.txt bad_nodes.txt
        # 只有在 sub.txt 或 bad_nodes.txt 发生变化时才提交
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update subscriptions and bad nodes" && git push)
